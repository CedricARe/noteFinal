<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notes Finales - Bacc Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">ETU3568</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/candidats">Candidats</a>
                <a class="nav-link" href="/matieres">Matières</a>
                <a class="nav-link" href="/parametres">Paramètres</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="card p-4">
            <h2 class="mb-3 text-primary">Notes Finales de : <span th:text="${candidat.nom + ' ' + candidat.prenom}"></span></h2>
            <p class="text-muted">Matricule: <span th:text="${candidat.matricule}"></span></p>
            
            <table class="table table-striped mt-4">
                <thead class="table-dark">
                    <tr>
                        <th>Matière</th>
                        <th>Note Finale</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="res : ${results}">
                        <td th:text="${res.matiere.nom}"></td>
                        <td class="fw-bold" th:text="${#numbers.formatDecimal(res.finalNote, 1, 2)}"></td>
                    </tr>
                </tbody>
            </table>
            
            <div class="mt-4">
                <a href="/" class="btn btn-secondary">Retour</a>
            </div>
        </div>
    </div>
</body>
</html>
