<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Matières - Bacc Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Bacc Notes</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/candidats">Candidats</a>
                <a class="nav-link active" href="/matieres">Matières</a>
                <a class="nav-link" href="/parametres">Paramètres</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-primary">Liste des Matières</h2>
                <a href="/matieres/new" class="btn btn-success">Ajouter</a>
            </div>
            
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Nom</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${matieres}">
                        <td th:text="${m.nom}"></td>
                        <td>
                            <a th:href="@{/matieres/edit/{id}(id=${m.id})}" class="btn btn-sm btn-warning">Éditer</a>
                            <a th:href="@{/matieres/delete/{id}(id=${m.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Supprimer?')">Supprimer</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
