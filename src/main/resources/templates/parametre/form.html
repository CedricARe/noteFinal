<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulaire Paramètre - Bacc Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">ETU3568</a>
        </div>
    </nav>
    <div class="container">
        <div class="card p-4 col-md-8 mx-auto">
            <h2 class="mb-4 text-primary" th:text="${parametre.id == null ? 'Nouveau Paramètre' : 'Modifier Paramètre'}"></h2>
            <form th:action="@{/parametres}" th:object="${parametre}" method="post">
                <input type="hidden" th:field="*{id}" />
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Matière</label>
                        <select th:field="*{matiere}" class="form-select" required>
                            <option value="">-- Sélectionner --</option>
                            <option th:each="m : ${matieres}" th:value="${m.id}" th:text="${m.nom}"></option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Seuil (Différance)</label>
                        <input type="number" step="0.01" th:field="*{seuil}" class="form-control" required />
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Opérateur</label>
                        <select th:field="*{operateur}" class="form-select" required>
                            <option value="">-- Sélectionner --</option>
                            <option th:each="o : ${operateurs}" th:value="${o.id}" th:text="${o.nom}"></option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Résolution</label>
                        <select th:field="*{resolution}" class="form-select" required>
                            <option value="">-- Sélectionner --</option>
                            <option th:each="r : ${resolutions}" th:value="${r.id}" th:text="${r.nom}"></option>
                        </select>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                    <a href="/parametres" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
