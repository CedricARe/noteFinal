<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulaire Candidat - Bacc Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">ETU3568</a>
        </div>
    </nav>
    <div class="container">
        <div class="card p-4 col-md-8 mx-auto">
            <h2 class="mb-4 text-primary" th:text="${candidat.id == null ? 'Nouveau Candidat' : 'Modifier Candidat'}"></h2>
            <form th:action="@{/candidats}" th:object="${candidat}" method="post">
                <input type="hidden" th:field="*{id}" />
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nom</label>
                        <input type="text" th:field="*{nom}" class="form-control" required />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Prénom</label>
                        <input type="text" th:field="*{prenom}" class="form-control" required />
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Matricule</label>
                    <input type="text" th:field="*{matricule}" class="form-control" required />
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                    <a href="/candidats" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
